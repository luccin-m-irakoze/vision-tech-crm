# =============================================================================
# NGINX configuration for the Vue.js SPA container.
#   * Serve the static bundle at /
#   * Forward /api/* to the Spring Boot container on port 8080
#   * Make sure SPA deep-links (/customers/12) fall back to index.html
# =============================================================================
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health-check endpoint forwarding (so docker can probe the backend)
    location /actuator/ {
        proxy_pass         http://backend:8080;
    }

    # Long cache for hashed bundle files
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
