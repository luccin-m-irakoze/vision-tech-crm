# ============================================================================
# Vision Technologies CRM - Spring Boot configuration
# ============================================================================

spring.application.name=vision-tech-crm

# ---- Server ----------------------------------------------------------------
server.port=${SERVER_PORT:8080}

# ---- Datasource (MySQL) ----------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vision_crm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crm_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:crm_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Run schema.sql / data.sql AFTER Hibernate creates tables.
spring.sql.init.mode=never

# ---- JWT -------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:ChangeMeToAVeryLongRandomBase64SecretAtLeast64Chars0123456789ABCDEF}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- CORS ------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---- Logging ---------------------------------------------------------------
logging.level.com.visiontechcrm=INFO
logging.level.org.springframework.security=INFO

# ---- Jackson ---------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
