# ============================================================================
# Test-profile configuration — used by @SpringBootTest integration tests.
# Switches the persistence layer from MySQL to an in-memory H2 database so the
# tests can spin up the full ApplicationContext without external services.
# ============================================================================

# ---- Datasource (H2 in-memory) --------------------------------------------
spring.datasource.url=jdbc:h2:mem:vtc-crm-test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA / Hibernate -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Skip the MySQL-flavoured schema.sql / data.sql at boot in tests.
spring.sql.init.mode=never

# ---- JWT -------------------------------------------------------------------
app.jwt.secret=TestSecretValueThatIsLongEnoughForHmacSHA256-DoNotUseInProduction!!
app.jwt.expiration-ms=86400000

# ---- CORS ------------------------------------------------------------------
app.cors.allowed-origins=http://localhost:5173

# ---- Logging ---------------------------------------------------------------
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
